name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  FLUTTER_VERSION: stable

jobs:
  build-android:
    name: Android APK & AAB
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_VERSION }}
          cache: true
      - run: flutter pub get
      - run: flutter build apk --release
      - run: flutter build appbundle --release
      - uses: actions/upload-artifact@v4
        with:
          name: android
          path: |
            build/app/outputs/flutter-apk/app-release.apk
            build/app/outputs/bundle/release/app-release.aab

  build-web:
    name: Web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_VERSION }}
          cache: true
      - run: flutter pub get
      - run: flutter build web --release
      - name: Archive web build
        run: cd build/web && zip -r ../../flutter-tuner-web.zip .
      - uses: actions/upload-artifact@v4
        with:
          name: web
          path: flutter-tuner-web.zip

  build-ios:
    name: iOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_VERSION }}
          cache: true
      - run: flutter pub get
      - run: flutter build ios --no-codesign --release
      - name: Archive iOS build
        run: |
          cd build/ios/iphoneos
          zip -r ../../../flutter-tuner-ios.zip Runner.app
      - uses: actions/upload-artifact@v4
        with:
          name: ios
          path: flutter-tuner-ios.zip

  build-macos:
    name: macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_VERSION }}
          cache: true
      - run: flutter pub get
      - run: flutter build macos --release
      - name: Archive macOS build
        run: |
          cd build/macos/Build/Products/Release
          zip -r ../../../../../flutter-tuner-macos.zip "flutter_tuner.app"
      - uses: actions/upload-artifact@v4
        with:
          name: macos
          path: flutter-tuner-macos.zip

  build-linux:
    name: Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_VERSION }}
          cache: true
      - run: |
          sudo apt-get update -y
          sudo apt-get install -y ninja-build libgtk-3-dev libasound2-dev
      - run: flutter pub get
      - run: flutter build linux --release
      - name: Archive Linux build
        run: |
          cd build/linux/x64/release/bundle
          tar czf ../../../../../flutter-tuner-linux-x64.tar.gz .
      - uses: actions/upload-artifact@v4
        with:
          name: linux
          path: flutter-tuner-linux-x64.tar.gz

  build-windows:
    name: Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_VERSION }}
          cache: true
      - run: flutter pub get
      - run: flutter build windows --release
      - name: Archive Windows build
        shell: pwsh
        run: Compress-Archive -Path build\windows\x64\runner\Release\* -DestinationPath flutter-tuner-windows-x64.zip
      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: flutter-tuner-windows-x64.zip

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-android, build-web, build-ios, build-macos, build-linux, build-windows]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Display artifacts
        run: ls -R artifacts/
      - name: Rename artifacts for release
        run: |
          mv artifacts/android/flutter-apk/app-release.apk artifacts/flutter-tuner-android.apk
          mv artifacts/android/bundle/release/app-release.aab artifacts/flutter-tuner-android.aab
          mv artifacts/web/flutter-tuner-web.zip artifacts/
          mv artifacts/ios/flutter-tuner-ios.zip artifacts/
          mv artifacts/macos/flutter-tuner-macos.zip artifacts/
          mv artifacts/linux/flutter-tuner-linux-x64.tar.gz artifacts/
          mv artifacts/windows/flutter-tuner-windows-x64.zip artifacts/
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/flutter-tuner-android.apk
            artifacts/flutter-tuner-android.aab
            artifacts/flutter-tuner-web.zip
            artifacts/flutter-tuner-ios.zip
            artifacts/flutter-tuner-macos.zip
            artifacts/flutter-tuner-linux-x64.tar.gz
            artifacts/flutter-tuner-windows-x64.zip
